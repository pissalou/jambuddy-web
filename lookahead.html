<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LookAhead</title>
</head>
<body>
<div id="settings" style="float: right;">&nbsp;</div>
<div id="midi-transport">
    <button id="playbtn" style="height: 2.1em">&#9654;</button>
    <button id="stopbtn">&#x23F9;</button>
    <span id="timeline">00:00.000</span>
</div>
<script type="module">
import {WebMidi} from 'https://cdn.jsdelivr.net/npm/webmidi@3.1.16/+esm';
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const worker = new Worker('./lookahead-worker.js');
const verovioWorker = new Worker('./verovio-worker.js');
let timemap = null; // This will hold the mapping of musical time to realtime for visual sync
let bpm = 120;
const ppqn = 24; // Pulses Per Quarter Note (standard MIDI timing)
let lookAhead = 0.050; // 50ms look-ahead window
// State for the midi-transport element
let intervalMs = 60000 / bpm / ppqn; // How often the worker should send 'tick' messages (in milliseconds)
let spp = 0; // song position pointer (in sixteenth notes)
let audioStartTime = 0; // Will be set to audio context time when the metronome started
let nextSppTime = 0.0; // When the next sixteenth note should occur (in seconds)
let nextNoteTime = 0.0;  // When the next beat should occur (in seconds) TODO rename to nextClickTime for consistency
let lastVisualizedSppTime = -1;
let clickBuffer = null; // This will hold our decoded audio data
const BASE64_CLICK_SOUND = "UklGRiwBAABXQVZFZm10IBAAAAABAAEAIlYAACJWAAABAAgAZGF0YQgBAACAs9319+TAkWA2GhEcOGCNttXj4Muqglo6JyUyTXGWtsvTzLeZd1dANDZFXnybs8LEu6eMcFdHQEVUa4Wdr7i3rZqDbFlOS1JhdYqdqq+soZB9alxVVV1rfI2cpaeil4h4amBbXmZygY+aoKCakIN2amNhZW14hI+Xm5mTin90bGdna3N8ho+VlpSOhnx0bmtscHd/iI6Sko+Kgnt0cG5wdHuCiI2Pj4uGgHp1cnFzeH2DiIuNi4iDfnl2dHR2en+EiIqKiYaBfXl3dnZ5fICEh4iIh4SAfHp4d3h7foGEhoeGhYJ/fHp5eXp8f4KEhYaFg4F+fHt6ent9gIKEhYWEgoB+fHt7e30=";
// Ensure audio is decoded before starting the timer
await initAudio();

// 0. Convert Base64 to an ArrayBuffer
function base64ToArrayBuffer(base64) {
  const binaryString = window.atob(base64);
  const len = binaryString.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    bytes[i] = binaryString.charCodeAt(i);
  }
  return bytes.buffer;
}

let midiOutput = null;
let settings = document.getElementById("settings");
WebMidi
  .enable()
  .then(() => {
  // Display available MIDI input devices
  if (WebMidi.inputs.length < 1) {
    settings.innerHTML+= "No device detected.";
  } else {
    settings.innerHTML+= "<br>Available MIDI input devices: <br>";
    WebMidi.inputs.forEach((device, index) => {
      settings.innerHTML+= `${index}: ${device.name} <br>`;
      // TODO present devices better and allow user to select one or more devices
    });
    midiOutput = WebMidi.outputs[WebMidi.outputs.length - 1];
    console.log(`Connected to MIDI Output Device: ${midiOutput.name}`);
    window.midiOutput = midiOutput; // for debugging purposes
  }}).catch(err => alert(err));

// 2. Pre-decode the base64 audio string into an AudioBuffer
async function initAudio() {
  if (clickBuffer) return; // Already decoded
  try {
    const arrayBuffer = base64ToArrayBuffer(BASE64_CLICK_SOUND);
    // decodeAudioData converts raw file bytes into PCM data the sound card understands
    clickBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    console.log("Click sound successfully loaded!");
  } catch (err) {
    console.error("Error decoding base64 audio:", err);
  }
}

// 2b. For elapsed time display or logging:
function elapsedMs(timeS = audioCtx.currentTime) {
  return (timeS - audioStartTime) * 1000;
}

function scheduledMs(time) {
  return elapsedMs(time);
}

// 3. Schedule the sample to play at an exact hardware time
function scheduleSample(time) { // rename scheduleClick(audioTimestamp) for consistency
  if (!clickBuffer) return;
  // AudioBufferSourceNodes are one-time-use items.
  // You must create a new pointer wrapper every time you want to play it.
  const source = audioCtx.createBufferSource();
  source.buffer = clickBuffer;  // TODO rename metronomeSoundBuffer for clarity
  console.log(`MetronomeClick@${scheduledMs(time).toFixed(1)}ms`);
  source.connect(audioCtx.destination);
  // Tell the hardware clock exactly when to play this buffer
  source.start(time);
}

function scheduleMIDIEvent(timestamp) {
  if (!midiOutput) return;
  // Send the Note On message stamped with the precise future timestamp
  midiOutput.playNote(75, {channels: [10], attack: 0.8, time: timestamp});
  // Schedule the Note Off message 500ms later
  //midiOutput.stopNode(75, {time: timestamp + 500});
}

function audio2midiTimestamp(audioTargetTime) {
  // How many SECONDS into the future is this event supposed to happen?
  const secondsInFuture = audioTargetTime - audioCtx.currentTime;
  // Convert those seconds to milliseconds, and add it to the current MIDI clock
  return performance.now() + (secondsInFuture * 1000);
}

function getSvgElementsAtTime(audioTargetTime) {
  if (!timemap || timemap.length === 0) return { on: [], off: [] };
  const targetElapsedMs = (audioTargetTime - audioStartTime) * 1000;
  let closest = timemap[0];
  for (const entry of timemap) {
    if (entry.tstamp <= targetElapsedMs) {
      closest = entry;
    } else {
      break; // timemap is sorted by tstamp
    }
  }
  return closest;
}

// 4. The worker heartbeat loop
worker.onmessage = function(e) {
  if (e.data === 'tick') {
    // console.log(`Received tick at ${audioCtx.currentTime.toFixed(3) * 1000}ms`);
    let svgElementMap = getSvgElementsAtTime(audioCtx.currentTime);
    //console.log(svgElementMap);  // map of on/off notes as arrays
    if (!svgElementMap.on) { stopMetronome(); return; }// No more events in the timemap, stop
    svgElementMap.on.forEach(id => {
      id = id.replace(/-rend\d+$/,'');
      //console.log(`Highlighting element ${id} at time ${audioCtx.currentTime.toFixed(3)}s`);
      document.getElementById(id).style.fill = 'red'; // Highlight the element that should be played
    });
    svgElementMap.off?.forEach(id => {
      id = id.replace(/-rend\d+$/,'');
      document.getElementById(id).style.fill = ''; // Highlight the element that should be played
    });
    while (nextSppTime < audioCtx.currentTime + lookAhead) {
      nextSppTime = audioStartTime + spp * (60.0 / bpm / 4); // Time duration of a sixteenth note TODO calculate with ppqn
      if (spp % 4 === 0) { // Only schedule on quarter notes (every 4 sixteenth notes)
        scheduleSample(nextNoteTime);  // rename scheduleClick
        scheduleMIDIEvent(audio2midiTimestamp(nextNoteTime));
        nextNoteTime += 60.0 / bpm;
      }
      spp += 1; // Advance the song position pointer (in sixteenth notes)
    }
  }
};

// 4b. Visual feedback loop (runs in the main thread, synced to the display refresh rate)
const visualTimeline = document.getElementById('timeline');
function updateGui() {
  const currentTime = audioCtx.currentTime;
  // Check if the audio clock has crossed into the next scheduled note time,
  // and make sure we haven't already updated for this specific spp.
  if (nextSppTime > currentTime && lastVisualizedSppTime !== nextSppTime) {
    // Check if a spp JUST happened in the last frame window
    // (We look slightly backward to see if the playback line crossed a marker)
    const timeSinceLastUpdate = currentTime - (nextSppTime - (60.0 / bpm / 4));
    if (timeSinceLastUpdate >= 0 && timeSinceLastUpdate < 0.05) {  // TODO make this threshold configurable
      visualTimeline.innerText = `00:${String((spp / 4).toFixed(3)).padStart(6, '0')}`; // Update the visual timeline
      // Lock this spp time so we don't update again until the next spp
      lastVisualizedSppTime = nextSppTime;
    }
  }
  // Tell the browser to run this loop again on the next monitor refresh pass
  requestAnimationFrame(updateGui);
}

// 5. Control triggers
async function startMetronome() {
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }
  audioStartTime = audioCtx.currentTime;
  nextSppTime = audioStartTime;
  nextNoteTime = audioStartTime;
  console.log(`Starting metronome at ${bpm} BPM...`);
  worker.postMessage({cmd: 'start', interval: intervalMs});
  requestAnimationFrame(updateGui); // TODO store animationFrameId and eventually stop it in stopMetronome to avoid unnecessary CPU usage when stopped
}

function stopMetronome() {
  worker.postMessage('stop');
  //spp = 0;
  // visualTimeline.innerText = `00:00.000`;
}

document.getElementById('playbtn').addEventListener('click', () => startMetronome());
document.getElementById('stopbtn').addEventListener('click', () => stopMetronome());

verovioWorker.onmessage = function(e){
  if (e.data.cmd === 'svg') {
    document.body.insertAdjacentHTML('beforeend', e.data.data);
    timemap = e.data.metadata;
    window.timemap = timemap; // for debugging purposes
    //console.log(timemap);
  }
};
verovioWorker.postMessage({cmd: 'render', options: {inputFrom: 'mei'}, url: './4_4_beat.mei.xml'});
</script>
</body>
</html>
